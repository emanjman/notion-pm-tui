name: retrieve page relation ids (milestone)
url: $NOTION_API_URL/pages/$NOTION_HOOP_ARCHIVES_ID/properties/:milestonesPropId
auth:
  type: bearer_token
  bearer_token:
    token: $NOTION_API_TOKEN
headers:
- name: Notion-Version
  value: $NOTION_VERSION
params:
- name: page_size
  value: '100'
path_params:
- name: milestonesPropId
  value: P%60%60s
